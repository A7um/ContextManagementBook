[book]
title = "Context Engineering for Long-Running LLM Agents"
authors = ["Atum <https://atum.li>"]
description = "A practitioner's guide to deciding what tokens enter the LLM's context window — grounded in production systems at Anthropic, OpenAI, Cursor, Cognition, and Manus."
language = "en"
multilingual = false
src = "book"

[build]
build-dir = "_book"
create-missing = false

[preprocessor.mermaid]
command = "mdbook-mermaid"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/A7um/ContextManagementBook"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/A7um/ContextManagementBook/edit/main/{path}"
site-url = "/ContextManagementBook/"
additional-css = ["theme/custom.css"]
additional-js = ["theme/mermaid.min.js", "theme/mermaid-init.js"]

[output.html.fold]
enable = true
level = 1

[output.html.playground]
editable = false
copyable = true

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
