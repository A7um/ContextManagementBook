[book]
title = "长时运行 LLM Agent 的上下文工程"
authors = ["Atum <https://atum.li>"]
description = "一本面向实践者的指南，探讨如何决定哪些 token 进入 LLM 的上下文窗口——基于 Anthropic、OpenAI、Cursor、Cognition 和 Manus 的生产系统经验。"
language = "zh"
multilingual = false
src = "book-zh"

[build]
build-dir = "_book/zh"
create-missing = false

[preprocessor.mermaid]
command = "mdbook-mermaid"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/A7um/ContextManagementBook"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/A7um/ContextManagementBook/edit/main/{path}"
site-url = "/ContextManagementBook/zh/"
additional-css = ["theme/custom.css", "theme/book-zoom.css", "theme/lang-switcher.css"]
additional-js = ["theme/mermaid.min.js", "theme/mermaid-init.js", "theme/book-zoom.js", "theme/lang-switcher.js"]

[output.html.fold]
enable = true
level = 1

[output.html.playground]
editable = false
copyable = true

[output.html.search]
enable = true
limit-results = 20
teaser-word-count = 20
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 2
